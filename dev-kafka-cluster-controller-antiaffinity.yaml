# ======================================================================
# EPay Common Chart - dev Environment Configuration
# =======================================================================
# Global values for all charts 
global:
  environment: dev
  clusterDomain: dev.epay.sbi
  imageRegistry: registry.dev.epay.sbi:8443
  imagePullSecrets: microservices-dev-pull-secret
  storageClass: trident-csi
# ================================================================
# Service Mesh 3.0 Configuration (dev Instance) 
# ================================================================#
serviceMesh:
  enabled: true
  # Core Istio Control Plane
  controlPlane:
    name: "dev-istio"
    namespace: "dev-istio-system"
    version: "v1.24-latest"
    updateStrategy: "InPlace"
    meshId: "dev-mesh"
    network: "dev-network"
    # Discovery selector for namespace scoping
    discoverySelector:
      key: "istio-discovery"
      value: "dev-istio"
  # CNI Configuration
  cni:
    enabled: true
    createResource: true
    name: "default"
    namespace: "istio-cni"
    excludeNamespaces:
      - dev-istio-system
      - dev-istio-cni
      - kube-system
      - openshift-system
      - openshift-operators
      - openshift-monitoring
      - openshift-user-workload-monitoring
  # Gateway Configuration (One-time mesh-wide)
  gateway:
    # Istio Gateway resource
    istioGateway:
      name: "dev-gateway"
      namespace: "dev-istio-system"
      hosts:
        - "dev.epay.sbi"
      port: 8080
    # Gateway Deployment and Service
    deployment:
      name: "dev-istio-gateway"
      namespace: "dev-istio-system"
      replicas: 1
      selector: "dev-istio-gateway"
      revision: "dev-istio"
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "2000m"
          memory: "1024Mi"
    # Gateway Service
    service:
      name: "dev-istio-gateway-service"
      type: ClusterIP
      ports:
        status: 15021
        http: 8080
        https: 8443
    # OpenShift Route
    route:
      name: "dev-istio-gateway-route"
      enabled: true
      host: "dev.epay.sbi"
      tls:
        termination: "edge"
        insecureEdgeTerminationPolicy: "None"
  # Service Mesh HPA Configuration (Environment-level)
  hpa:
    enabled: true
    # Istio Control Plane HPA
    istiod:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: "Percent"
              value: 50
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: "Percent"
              value: 10
              periodSeconds: 60
    # Istio Gateway HPA
    gateway:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: "Percent"
              value: 100
              periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: "Percent"
              value: 10
              periodSeconds: 60

# ================================================================
# Infrastructure Services (One-time mesh-wide)
# ================================================================


  # Traffic Management Configuration (Infrastructure level only)#
  trafficManagement:
    virtualServices:
      enabled: true
    destinationRules:
      enabled: true
  # Security Configuration (Infrastructure level only)
  security:
    authorizationPolicies:
      enabled: true
infrastructure:
  # Infrastructure peer authentication (mesh-wide)
  peerAuthentication:
    # Disable mTLS for infrastructure components in dev
    kafka:
      enabled: false
      mtlsMode: "DISABLE"
    gemfire:
      enabled: true
      mtlsMode: "DISABLE"
    managementConsoles:
      enabled: true
      mtlsMode: "DISABLE"

# ================================================================
# Security Configuration
# ================================================================
security:
  enabled: true
  scc:
    enabled: false
    name: "epay-restricted-scc"
    runAsUser:
      uidRangeMin: 1000
      uidRangeMax: 2000
    seLinux:
      level: "s0"
    fsGroup:
      min: 1000
      max: 2000
    supplementalGroups:
      min: 1000
      max: 2000
    users: []
    groups: []
  # Security contexts for containers
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  # Network policies for infrastructure
  networkPolicies:
    enabled: false
  # Service accounts for infrastructure components
  serviceAccounts:
    enabled: false
#
# ================================================================#
# GemFire Configuration (Simplified to match reference)
# ================================================================
gemfire:
  enabled: false
  namespace: "dev-gemfire"

  cluster:
    name: "gemfire-dev-system"
    image: "registry.dev.epay.sbi:8443/ubi9/pivotal-gemfire/vmware-gemfire:10.1.2"

    locators:
      terminationGracePeriodSeconds: 120
      replicas: 3
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/worker
                    operator: Exists
                  - key: workload-type
                    operator: In
                    values:
                      - gemfire
      tolerations:
        - key: "workload-type"
          operator: "Equal"
          value: "gemfire"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300  

    servers:
      terminationGracePeriodSeconds: 120
      replicas: 3
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/worker
                    operator: Exists
                  - key: workload-type
                    operator: In
                    values:
                      - gemfire
      tolerations:
        - key: "workload-type"
          operator: "Equal"
          value: "gemfire"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300

  managementConsole:
    route:
      enabled: true
      host: "gemfire-management-console.apps.dev.epay.sbi"
      tls:
        termination: "edge"
        insecureEdgeTerminationPolicy: "Redirect"

    enabled: true
    name: dev-gmc
    image: registry.dev.epay.sbi:8443/ubi9/gemfire-management-console/gemfire-management-console:latest
    replicas: 1
    port: 8080
    pvcName: gemfire-data-dev-gmc-0
  env:
    - name: server.port
      value: "8080"
    - name: GMC_WEBSOCKET_SENDBUFFERSIZELIMIT
      value: "5120000"
    - name: PROMETHEUS_SCRAPE_INTERVAL
      value: "2s"
  resources:
    requests:
      storage: 4Gi
  volume:
    name: gemfire-data
    mountPath: /opt/gemfire/VMware_GemFire_Management_Console
    storageClassName: trident-csi-retain
    terminationGracePeriodSeconds: 120

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/worker
                  operator: Exists
                - key: workload-type
                  operator: In
                  values:
                    - gemfire

    tolerations:
      - key: "workload-type"
        operator: "Equal"
        value: "gemfire"
        effect: "NoSchedule"
      - key: "node.kubernetes.io/disk-pressure"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
    # Route configuration
    #route:
    #  enabled: true
    #  host: "gemfire-management-console.apps.dev.epay.sbi"
    #  tls:
    #    termination: "edge"
    #    insecureEdgeTerminationPolicy: "Redirect"

# ================================================================#
# Kafka Configuration (AMQ Streams - KRaft JBOD)
# ================================================================
kafka:
  enabled: true
  namespace: "dev-kafka"
  # Kafka Cluster Configuration (KRaft mode)
  cluster:
    name: "dev-kafka-cluster"
    version: "3.9.0"
    metadataVersion: "3.9-IV0"
    # Annotations
    annotations:
      strimzi.io/node-pools: "enabled"
      strimzi.io/kraft: "enabled"
    # Kafka configuration
    kafka:
      listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
      - name: external
        port: 9094
        type: route
        tls: true   
      config:
        offsets.topic.replication.factor: 3
        transaction.state.log.replication.factor: 3
        transaction.state.log.min.isr: 2
        default.replication.factor: 3
        min.insync.replicas: 2
        # PDF Recommendations - Additional config
        acks: "all"
        # Performance tuning
        num.network.threads: 8
        num.io.threads: 8
        socket.send.buffer.bytes: 102400
        socket.receive.buffer.bytes: 102400
        socket.request.max.bytes: 104857600
        log.retention.hours: 168
        log.segment.bytes: 1073741824
        log.retention.check.interval.ms: 300000
        log.cleanup.policy: "delete"
        compression.type: "producer"
    # Controller node pool (PDF: At least 3, 4+ vCPU, 8GB+ RAM, 64GB+ disk)
    controller:
      name: "controller"
      replicas: 3
      roles:
        - controller
      # PDF Recommendation: Resource specifications for controllers
      resources:
        requests:
          memory: "8Gi"
          cpu: "4"
        limits:
          memory: "16Gi"
          cpu: "8"
      storage:
        type: jbod
        volumes:
          - id: 0
            type: persistent-claim
            size: 100Gi  # Keep existing size to avoid warning
            kraftMetadata: shared
            deleteClaim: false
      # PDF Recommendation: terminationGracePeriodSeconds >60s
      terminationGracePeriodSeconds: 120
      # Pod anti-affinity to spread controllers across worker nodes
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: strimzi.io/pool-name
                    operator: In
                    values:
                      - controller
              topologyKey: kubernetes.io/hostname
      # Node affinity for controllers
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #       - matchExpressions:
      #         - key: node-role.kubernetes.io/worker
      #           operator: Exists
      #         - key: workload-type
      #           operator: In
      #           values: ["kafka"]
      # # Tolerations for controllers
      # tolerations:
      #   - key: "workload-type"
      #     operator: "Equal"
      #     value: "kafka"
      #     effect: "NoSchedule"
      #   - key: "node.kubernetes.io/disk-pressure"
      #     operator: "Exists"
      #     effect: "NoExecute"
      #     tolerationSeconds: 300
    # Broker node pool (PDF: At least 3, 12+ vCPU, 64GB+ RAM, 1TB+ disk)
    broker:
      name: "broker"
      replicas: 3
      roles:
        - broker
      # PDF Recommendation: Resource specifications for brokers
      resources:
        requests:
          memory: "64Gi"
          cpu: "12"
        limits:
          memory: "128Gi"
          cpu: "24"
      storage:
        type: jbod
        volumes:
          - id: 0
            type: persistent-claim
            size: 100Gi  # Keep existing size to avoid warning
            kraftMetadata: shared
            deleteClaim: false
          - id: 1
            type: persistent-claim
            size: 100Gi  # Keep existing size to avoid warning
            deleteClaim: false
      # PDF Recommendation: terminationGracePeriodSeconds >60s
      terminationGracePeriodSeconds: 120
      # Pod anti-affinity to spread brokers across worker nodes
      # Prevents all 3 brokers landing on same node (current risk on worker1.dev)
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: strimzi.io/pool-name
                    operator: In
                    values:
                      - broker
              topologyKey: kubernetes.io/hostname
  ###     
  metricsConfig:
    enabled: true 
    key: kafka-metrics-config.yaml
    name: kafka-metrics 
    clusterOperator:
      path: /metrics
      port: http
    entityOperator:
      path: /metrics
      port: healthcheck
    kafkaBridge:
      path: /metrics
      port: rest-api
    kafkaResources:
      path: /metrics
      port: tcp-prometheus
      
  relabelings:
    enabled: true
    rules:
      - sourceLabels: [__meta_kubernetes_pod_label_strimzi_io_.*]
        separator: ;
        regex: (.+)
        replacement: $1
        action: labelmap
      - sourceLabels: [__meta_kubernetes_namespace]
        separator: ;
        regex: (.*)
        targetLabel: namespace
        replacement: $1
        action: replace
      - sourceLabels: [__meta_kubernetes_pod_name]
        separator: ;
        regex: (.*)
        targetLabel: kubernetes_pod_name
        replacement: $1
        action: replace
      - sourceLabels: [__meta_kubernetes_pod_node_name]
        separator: ;
        regex: (.*)
        targetLabel: node_name
        replacement: $1
        action: replace
      - sourceLabels: [__meta_kubernetes_pod_host_ip]
        separator: ;
        regex: (.*)
        targetLabel: node_ip
        replacement: $1
        action: replace



  # PDF Recommendation: Cruise Control for cluster rebalancing
  cruiseControl:
    enabled: true
    name: "dev-kafka-cruise-control"
    resources:
      requests:
        memory: "2Gi"
        cpu: "1"
      limits:
        memory: "4Gi"
        cpu: "2"
    livenessProbe:
      initialDelaySeconds: 120
      timeoutSeconds: 30
      periodSeconds: 15
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 60
      timeoutSeconds: 30
      periodSeconds: 15
      failureThreshold: 5
    config:
      # Cruise Control configuration
      default.goals: >
        com.linkedin.kafka.cruisecontrol.analyzer.goals.RackAwareGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.ReplicaCapacityGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.DiskCapacityGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkInboundCapacityGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkOutboundCapacityGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.CpuCapacityGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.ReplicaDistributionGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.PotentialNwOutGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.DiskUsageDistributionGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkInboundUsageDistributionGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkOutboundUsageDistributionGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.CpuUsageDistributionGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.TopicReplicaDistributionGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.LeaderReplicaDistributionGoal,
        com.linkedin.kafka.cruisecontrol.analyzer.goals.LeaderBytesInDistributionGoal
      cpu.balance.threshold: "1.1"
      disk.balance.threshold: "1.1"
      network.inbound.balance.threshold: "1.1"
      network.outbound.balance.threshold: "1.1"

  # PDF Recommendation: Kafka Connect for database integration
  kafkaConnect:
    enabled: true
    name: "dev-kafka-connect-mq"
    replicas: 3
    bootstrapServers: "dev-kafka-cluster-kafka-bootstrap.dev-kafka.svc.cluster.local:9093"
    image: "registry.dev.sbiepay.sbi:8443/library/kafka-connect-mq:v3"
    imagePullSecrets:
      - microservices-dev-pull-secret
    resources:
      requests:
        memory: "4Gi"
        cpu: "2"
      limits:
        memory: "8Gi"
        cpu: "4"
    config:
      group:
        id: "dev-kafka-connect-mq-cluster"
      offset:
        storage:
          topic: "dev-kafka-connect-mq-offsets"
        flush:
          interval:
            ms: 10000
          timeout:
            ms: 5000
      config:
        storage:
          topic: "dev-kafka-connect-mq-configs"
      status:
        storage:
          topic: "dev-kafka-connect-mq-status"
      session:
        timeout:
          ms: 60000
      heartbeat:
        interval:
          ms: 20000
      rebalance:
        timeout:
          ms: 120000
    # Liveness probe tuning - prevents kubelet from killing Connect pods
    # during broker rolling restarts or GC pauses (root cause of exit 137 restarts)
    livenessProbe:
      initialDelaySeconds: 60
      timeoutSeconds: 30
      periodSeconds: 30
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 60
      timeoutSeconds: 30
      periodSeconds: 30
      failureThreshold: 5
    # # Auto-restart failed connector tasks - eliminates manual task restart
    # # after pod recovers from a broker outage
    # autoRestart:
    #   enabled: true
    #   maxRestarts: 10
    connectors:
      - name: "neft-mq-source"
        class: "com.ibm.eventstreams.connect.mqsource.MQSourceConnector"
        tasksMax: 1
        config:
          mq.queue.manager: "SBI_NEFT"
          mq.connection.name.list: "10.176.10.213(2001)"
          mq.channel.name: "SBIEPAY2.SVRCONN"
          mq.queue: "NeftInboundQueue"
          mq.record.builder: "com.ibm.eventstreams.connect.mqsource.builders.DefaultRecordBuilder"
          mq.message.body.format: "string"
          topic: "neft.inbound.kafka.topic"
          value.converter: "org.apache.kafka.connect.converters.ByteArrayConverter"
          value.converter.schemas.enable: "false"
          errors.tolerance: "all"
          errors.deadletterqueue.topic.name: "neft-connect.dlq"
          errors.deadletterqueue.topic.replication.factor: "3"
          errors.deadletterqueue.context.headers.enable: "true"
          errors.deadletterqueue.key.serializer: "org.apache.kafka.common.serialization.StringSerializer"
          errors.deadletterqueue.value.serializer: "org.apache.kafka.common.serialization.ByteArraySerializer"
          errors.log.enable: "true"
          errors.log.include.messages: "true"
      - name: "neft-mq-sink"
        class: "com.ibm.eventstreams.connect.mqsink.MQSinkConnector"
        tasksMax: 1
        config:
          mq.queue.manager: "SBI_NEFT"
          mq.connection.name.list: "10.176.10.213(2001)"
          mq.channel.name: "SBIEPAY2.SVRCONN"
          mq.queue: "NeftOutBoundQueue"
          mq.message.builder: "com.ibm.eventstreams.connect.mqsink.builders.DefaultMessageBuilder"
          mq.message.body.format: "string"
          topics: "neft.outbound.kafka.topic"
          value.converter: "org.apache.kafka.connect.converters.ByteArrayConverter"
          value.converter.schemas.enable: "false"
      - name: "mis-mq-source"
        class: "com.ibm.eventstreams.connect.mqsource.MQSourceConnector"
        tasksMax: 1
        config:
          mq.queue.manager: "SBI_NEFT"
          mq.connection.name.list: "10.176.10.213(2001)"
          mq.channel.name: "SBIEPAY2.SVRCONN"
          mq.queue: "NeftMISCInboundQueue"
          mq.record.builder: "com.ibm.eventstreams.connect.mqsource.builders.DefaultRecordBuilder"
          mq.message.body.format: "string"
          topic: "neft.mis.inbound.kafka.topic"
          value.converter: "org.apache.kafka.connect.converters.ByteArrayConverter"
          value.converter.schemas.enable: "false"
      - name: "mis-mq-sink"
        class: "com.ibm.eventstreams.connect.mqsink.MQSinkConnector"
        tasksMax: 1
        config:
          mq.queue.manager: "SBI_NEFT"
          mq.connection.name.list: "10.176.10.213(2001)"
          mq.channel.name: "SBIEPAY2.SVRCONN"
          mq.queue: "NeftMISCOutBoundQueue"
          mq.message.builder: "com.ibm.eventstreams.connect.mqsink.builders.DefaultMessageBuilder"
          mq.message.body.format: "string"
          topics: "neft.mis.outbound.kafka.topic"
          value.converter: "org.apache.kafka.connect.converters.ByteArrayConverter"
          value.converter.schemas.enable: "false"
      - name: "rtgs-mq-source"
        class: "com.ibm.eventstreams.connect.mqsource.MQSourceConnector"
        tasksMax: 1
        config:
          mq.queue.manager: "SBI_RTGS"
          mq.connection.name.list: "10.176.10.213(2005)"
          mq.channel.name: "SBIEPAY2.SVRCONN"
          mq.queue: "RTGSInboundQueue"
          mq.record.builder: "com.ibm.eventstreams.connect.mqsource.builders.DefaultRecordBuilder"
          mq.message.body.format: "string"
          topic: "rtgs.inbound.kafka.topic"
          value.converter: "org.apache.kafka.connect.converters.ByteArrayConverter"
          value.converter.schemas.enable: "false"
          errors.tolerance: "all"
          errors.deadletterqueue.topic.name: "rtgs-connect.dlq"
          errors.deadletterqueue.topic.replication.factor: "3"
          errors.deadletterqueue.context.headers.enable: "true"
          errors.deadletterqueue.key.serializer: "org.apache.kafka.common.serialization.StringSerializer"
          errors.deadletterqueue.value.serializer: "org.apache.kafka.common.serialization.ByteArraySerializer"
          errors.log.enable: "true"
          errors.log.include.messages: "true"
      - name: "rtgs-mq-sink"
        class: "com.ibm.eventstreams.connect.mqsink.MQSinkConnector"
        tasksMax: 1
        config:
          mq.queue.manager: "SBI_RTGS"
          mq.connection.name.list: "10.176.10.213(2005)"
          mq.channel.name: "SBIEPAY2.SVRCONN"
          mq.queue: "RTGSOutBoundQueue"
          mq.message.builder: "com.ibm.eventstreams.connect.mqsink.builders.DefaultMessageBuilder"
          mq.message.body.format: "string"
          topics: "rtgs.outbound.kafka.topic"
          value.converter: "org.apache.kafka.connect.converters.ByteArrayConverter"
          value.converter.schemas.enable: "false"

    # PDF Recommendation: MirrorMaker 2 for disaster recovery
  mirrorMaker2:
    enabled: false
    name: "dev-kafka-mirror-maker"
    # Active/Passive setup for DR
    clusters:
      - alias: "source"
        bootstrapServers: "dev-kafka-cluster-kafka-bootstrap.dev-kafka.svc.cluster.local:9092"
      - alias: "target"
        bootstrapServers: "dr-kafka-cluster-kafka-bootstrap.dr-kafka.svc.cluster.local:9092"
    mirrors:
      - sourceCluster: "source"
        targetCluster: "target"
        sourceConnector:
          config:
            replication.factor: 3
            offset-syncs.topic.replication.factor: 3
            sync.topic.acls.enabled: true
            replication.policy.class: "org.apache.kafka.connect.mirror.IdentityReplicationPolicy"
        heartbeatConnector:
          config:
            heartbeats.topic.replication.factor: 3
        checkpointConnector:
          config:
            checkpoints.topic.replication.factor: 3
        topicsPattern: ".*"
        groupsPattern: ".*"
    resources:
      requests:
        memory: "2Gi"
        cpu: "1"
      limits:
        memory: "4Gi"
        cpu: "2"

  # Kafka Users for ePay application    
  kafkaUser:
    enabled: true
    name: epay-user
    namespace: dev-kafka
    cluster: dev-kafka-cluster
    authentication:
      type: scram-sha-512  # Kafka Users for ePay application
       
  
console:
  enabled: true
  name: dev-console
  namespace: dev-kafka
  hostname: dev-kafkaconsole.apps.dev.sbiepay.sbi
  
  metrics:
    type: prometheus
    prometheus:
      url: http://thanos-querier.openshift-monitoring.svc.cluster.local:9091

  credentials:
    kafkaUser:
      name: epay-user

  listener: plain

  kafkaClusters:
    name: dev-kafka-cluster
    namespace: dev-kafka

    properties:
      values:
        - name: security.protocol
          value: PLAINTEXT

# Kafka Topics for ePay application
topics:
  - name: "dev-connect-cluster-offsets"
    partitions: 25
    replicas: 3
  - name: "dev-connect-cluster-configs"
    partitions: 1
    replicas: 3
  - name: "dev-connect-cluster-status"
    partitions: 5
    replicas: 3
  - name: "epay-db-history"
    partitions: 1
    replicas: 3
   

# PDF Recommendation: Distributed tracing for environment
tracing:
  enabled: false
  type: "tempo"
  # Create our own Tempo instance for dev environment
  tempo:
    enabled: false
    name: "dev-tempo"
    namespace: "dev-tempo"
    tenants:
       tenantName: dev
       tenantId: "1610b0c3-c509-4592-a256-a1871353dbfa"

    # Tempo instance configuration for latest operator
    spec:
      # Storage configuration
      storage:
        secret:
          name: "tempo-s3-storage-secret"
          type: "s3"
      # Retention policy
      retention:
        global:
          traces: "168h"  # 7 days
      # Resource configuration
      resources:
        total:
          limits:
            memory: "2Gi"
            cpu: "1000m"
          requests:
            memory: "1Gi" 
            cpu: "500m"
      # Service configuration for dev
      services:
        distributor:
          replicas: 1
        ingester:
          replicas: 1
        querier:
          replicas: 1
        query_frontend:
          replicas: 1
        compactor:
          replicas: 1
    # Persistence for our Tempo instance
    persistence:
      enabled: true
      size: "50Gi"
      storageClass: "trident-csi-retain"
# Environment-level monitoring infrastructure
monitoring:
  enabled: true
  
  # Use OpenShift User Workload Monitoring (built-in Prometheus)
  userWorkloadMonitoring:
    enabled: true
    namespace: "openshift-user-workload-monitoring"
    
  # Disable separate Prometheus deployment - use OpenShift built-in
  prometheus:
    enabled: true
    retention: "30d"
    
  # Grafana for enhanced dashboards (optional - OpenShift Console has basic monitoring)
  grafana:
    enabled: true
    persistence:
      enabled: true
      size: "20Gi"
      storageClass: "trident-csi-retain"
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1"
    
  # ServiceMonitor for infrastructure components (required for OpenShift monitoring)
  serviceMonitor:
    enabled: true
    labels:
      app: "epay-infrastructure-monitoring"
    endpoints:
      - port: "metrics"
        interval: "30s"
        path: "/metrics"
    
  # PrometheusRule for infrastructure alerting (works with OpenShift monitoring)
  prometheusRule:
    enabled: true
    rules:
      - alert: "KafkaClusterDown"
        expr: "kafka_server_replicamanager_leadercount == 0"
        for: "5m"
        labels:
          severity: "critical"
        annotations:
          summary: "Kafka cluster is down"
          description: "Kafka cluster has no active leaders"
      
      - alert: "TempoDown"
        expr: "up{job='tempo'} == 0"
        for: "5m"
        labels:
          severity: "critical"
        annotations:
          summary: "Tempo tracing is down"
          description: "Tempo distributed tracing service is unavailable"

      # ── DLQ / DLT Alert Rules ───────────────────────────────────────────

      - alert: "KafkaDLQFirstMessage"
        expr: "kafka_log_log_size{namespace='dev-kafka',topic=~'.*\\.dlt|.*\\.dlq'} > 0"
        for: "0m"
        labels:
          severity: "critical"
          environment: "dev"
        annotations:
          summary: "DLQ Alert -- failed message in {{ $labels.topic }}"
          description: "Immediate investigation required. Check consumer logs."

      - alert: "KafkaNEFTDLTMessage"
        expr: "kafka_log_log_size{namespace='dev-kafka',topic=~'neft\\..*\\.dlt'} > 0"
        for: "0m"
        labels:
          severity: "critical"
          domain: "neft"
          environment: "dev"
        annotations:
          summary: "CRITICAL -- NEFT DLT has failed messages"
          description: "NEFT transaction failed. Check epay_payment_service immediately."

      - alert: "KafkaRTGSDLTMessage"
        expr: "kafka_log_log_size{namespace='dev-kafka',topic=~'rtgs\\..*\\.dlt'} > 0"
        for: "0m"
        labels:
          severity: "critical"
          domain: "rtgs"
          environment: "dev"
        annotations:
          summary: "CRITICAL -- RTGS DLT has failed messages"
          description: "RTGS high-value transaction failed. Check epay_payment_service immediately."

      - alert: "KafkaDLQVolume30Percent"
        expr: "kafka_log_log_size{namespace='dev-kafka',topic=~'.*\\.dlt|.*\\.dlq'} > 1610612736"
        for: "5m"
        labels:
          severity: "warning"
          environment: "dev"
        annotations:
          summary: "DLQ Warning -- {{ $labels.topic }} at 30% capacity"
          description: "DLQ messages accumulating and not being cleared. Investigate."

      - alert: "KafkaDLQVolume50Percent"
        expr: "kafka_log_log_size{namespace='dev-kafka',topic=~'.*\\.dlt|.*\\.dlq'} > 2684354560"
        for: "3m"
        labels:
          severity: "warning"
          environment: "dev"
        annotations:
          summary: "DLQ Warning -- {{ $labels.topic }} at 50% capacity"
          description: "DLQ is half full. Urgent action required."

      - alert: "KafkaDLQVolume80Percent"
        expr: "kafka_log_log_size{namespace='dev-kafka',topic=~'.*\\.dlt|.*\\.dlq'} > 4294967296"
        for: "2m"
        labels:
          severity: "critical"
          environment: "dev"
        annotations:
          summary: "URGENT -- DLQ {{ $labels.topic }} at 80% capacity"
          description: "Risk of message loss. Clear DLQ immediately."

      - alert: "KafkaDLQNotCleared4Hours"
        expr: "kafka_log_log_size{namespace='dev-kafka',topic=~'.*\\.dlt|.*\\.dlq'} > 0"
        for: "240m"
        labels:
          severity: "warning"
          environment: "dev"
        annotations:
          summary: "SLA Breach -- DLQ {{ $labels.topic }} not cleared in 4 hours"
          description: "Escalate to App Team and Kafka Admin immediately."

      - alert: "KafkaDLQHighMessageRate"
        expr: "rate(kafka_log_log_size{namespace='dev-kafka',topic=~'.*\\.dlt|.*\\.dlq'}[5m]) > 10"
        for: "2m"
        labels:
          severity: "critical"
          environment: "dev"
        annotations:
          summary: "DLQ high message rate on {{ $labels.topic }}"
          description: "More than 10 messages per minute entering DLQ. Systemic failure likely."
        

  kiali:
    serviceAccount:
      name: dev-kiali-service-account
      namespace: dev-istio-system

    # Horizontal Pod Autoscaler configuration
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 2
      targetDeploymentName: kiali
      cpu:
        averageUtilization: 80
      memory:
        averageUtilization: 80

    deployment:
      cluster_wide_access: true
      instance_name: kiali
      logger:
        log_level: info
      view_only_mode: false

    external_services:
      tracing:
        auth:
          insecure_skip_verify: false
          type: "none"
          use_kiali_token: false
        enabled: false
        in_cluster_url: ""
        namespace_selector: false
        provider: ""
        query_timeout: 30s
        url: ""
        use_grpc: false
        
      grafana:
        enabled: false
      prometheus:
        auth:
          type: "none"
          use_kiali_token: false
        thanos_proxy:
          enabled: false
        url: ""    

    # RBAC configuration
    rbac:
      # General Kiali labels
      labels:
        app: kiali
        app.kubernetes.io/instance: dev-kiali
        app.kubernetes.io/name: kiali
        app.kubernetes.io/part-of: kiali

      # Annotations for the ClusterRoleBindings
      annotations:
        operator-sdk/primary-resource: dev-istio-system/dev-kiali
        operator-sdk/primary-resource-type: Kiali.kiali.io

      clusterRoleBindings:
        # ClusterRoleBinding for 'cluster-monitoring-view'
        monitoring:
          name: dev-kiali-cluster-monitoring-view
          roleName: cluster-monitoring-view

        # ClusterRoleBinding for OAuth
        oauth:
          name: dev-kiali-dev-istio-system-oauth
          roleName: dev-kiali-dev-istio-system-oauth

        # ClusterRoleBinding for Kiali Viewer
        viewer:
          name: dev-kiali
          roleName: dev-kiali-viewer


# Environment-level persistent storage
persistentStorage:
  enabled: true
  
  # Storage classes configuration
  storageClasses:
    default: "trident-csi-retain"
  
  # Persistent volumes for infrastructure components
  volumes:
    # Tempo storage
    tempo:
      enabled: true
      size: "50Gi"
      storageClass: "trident-csi-retain"
      accessMode: "ReadWriteOnce"
      
    # Prometheus storage (disabled - using OpenShift User Workload Monitoring)
    prometheus:
      enabled: true
      size: "200Gi"
      storageClass: "trident-csi-retain"
      accessMode: "ReadWriteOnce"      
    # Grafana storage
    grafana:
      enabled: true
      size: "20Gi"
      storageClass: "trident-csi-retain"
      accessMode: "ReadWriteOnce"
      
    # Kafka storage
    kafka:
      enabled: true
      size: "100Gi"
      storageClass: "trident-csi-retain"
      accessMode: "ReadWriteOnce"
      
    # Environment logs storage
    environment-logs:
      enabled: true
      size: "50Gi"
      storageClass: "trident-csi-retain"
      accessMode: "ReadWriteMany"
      
    # Backup storage
    backup:
      enabled: true
      size: "500Gi"
      storageClass: "trident-csi-retain"
      accessMode: "ReadWriteOnce"
      


# OpenTelemetry configuration for environment
opentelemetry:
  enabled: false
  
  # OpenTelemetry Collector
  collector:
    enabled: true
    replicas: 2
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1"
    
    # Collector configuration
    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"
        jaeger:
          protocols:
            grpc:
              endpoint: "0.0.0.0:14250"
            thrift_http:
              endpoint: "0.0.0.0:14268"
      
      processors:
        batch:
          timeout: "1s"
          send_batch_size: 1024
        memory_limiter:
          limit_mib: 1024
      
      exporters:
        tempo:
          endpoint: "tempo-distributor.dev-tempo.svc.cluster.local:4317"
          tls:
            insecure: true
      
      service:
        pipelines:
          traces:
            receivers: ["otlp", "jaeger"]
            processors: ["memory_limiter", "batch"]
            exporters: ["tempo"]

# TempoStack Configuration
tempo:
  name: simplest
  namespace: perf-tempo
  storage:
    secretName: tempo-s3-storage-secret
    type: s3
  storageSize: 100Gi
  resources:
    total:
      limits:
        memory: 10Gi
        cpu: 6000m
  tenants:
    mode: openshift
    authentication:
      - tenantName: dev
        tenantId: "1610b0c3-c509-4592-a256-a1871353dbfa"
  template:
    gateway:
      enabled: true
    queryFrontend:
      jaegerQuery:
        enabled: true
#
# OpenTelemetry Collector Configuration
otelCollector:
  name: dev
  namespace: tracing-system
  image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.92.0
  serviceAccountName: dev-collector
  tempoGateway:
    host: tempo-simplest-gateway
    grpcPort: 8090
    httpPort: 8080


################################################################
# Istio Configuration
istio:
  namespace: dev-istio-system
  meshConfig:
    enableTracing: true
    extensionProviders:
      - name: otel
        opentelemetry:
          port: 4317
          service: dev-collector.perf-istio-system.svc.cluster.local

# Kiali Configuration
kiali:
  namespace: dev-kiali
  deployment:
    cluster_wide_access: true
    instance_name: kiali
    logger:
      log_level: info
    view_only_mode: false
  external_services:
    tracing:
      enabled: true
      in_cluster_url: 'https://simplest-gateway.perf-tempo.svc.cluster.local:8080/api/traces/v1/dev'
      url: 'https://tempo-simplest-gateway-perf-tempo.apps.dev.epay.sbi/api/traces/v1/dev/search'
      auth:
        type: bearer
        use_kiali_token: true
        insecure_skip_verify: true
      provider: jaeger
      query_timeout: 30
      namespace_selector: true
    grafana:
      enabled: false
    prometheus:
      thanos_proxy:
        enabled: true
      url: 'https://thanos-querier.openshift-monitoring.svc.cluster.local:9091'
      auth:
        type: bearer
        use_kiali_token: true

# Telemetry Generation Jobs
telemetrygen:
  image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.92.0
  namespace: perf-istio-system
  grpc:
    enabled: true
    count: 10
  http:
    enabled: true
    count: 10

